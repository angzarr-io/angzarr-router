# Go codegen for the binding's OWN protos (io.angzarr.v1,
# io.angzarr.router.ffi.v1, test.counter). Managed mode re-homes them under
# this module's gen/ tree — the framework protos carry a go_package
# pointing at client-go's module, wrong for the router-owned binding (§8).
#
# google.* are the exception — third-party standards consumed from their
# published genproto modules (kept go_package, excluded via --exclude-path),
# not re-homed. sererr is ours, so it is generated and re-homed like the
# rest. The differential build (which also links the client-go oracle, a
# pre-rename copy of our framework) sets GOLANG_PROTOBUF_REGISTRATION_CONFLICT
# to tolerate the two-version overlap that cannot be avoided anyway (the
# options.proto extension numbers are identical across the rename).
version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      path: google
  override:
    - file_option: go_package_prefix
      value: github.com/angzarr-io/angzarr-router/bindings/go/gen
plugins:
  - local: protoc-gen-go
    out: bindings/go/gen
    opt: paths=source_relative
  # angzarr dispatch wiring for declared components (test.counter). Baked into
  # the go image (build/images/go) and invoked as a local plugin. The scaffold
  # (`angzarr scaffold go`) is an end-user command, not run here — the
  # conformance fixtures hand-implement the generated Handler interfaces.
  - local: ["angzarr", "codegen", "go"]
    out: bindings/go/gen
    opt: paths=source_relative

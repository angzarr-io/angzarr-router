# Python codegen for the binding's protos (io.angzarr.v1,
# io.angzarr.router.ffi.v1, test.counter, sererr). Pinned to the
# protocolbuffers/python plugin tag whose gencode targets the protobuf 7.x
# runtime the binding pins (pyproject/uv.lock) — gencode and runtime must
# agree or protobuf's runtime-version check fails at import.
#
# google.* are NOT generated: google.protobuf comes from the protobuf
# runtime and google.rpc/google.api from googleapis-common-protos (the
# Python analog of Go's genproto) — the standard-over-rolling-our-own
# precedent (§3). They are excluded at the `buf generate` invocation
# (justfile.container py-binding-gen).
#
# IMPORT REWRITE (load-bearing). The python plugin emits cross-file imports
# by proto PATH: `from io.angzarr.v1 import types_pb2`. A top-level `io`
# package cannot be imported — stdlib `io` is already loaded as a
# non-package module before any user code runs, so `from io.angzarr...`
# raises "io is not a package". (client-python never hit this: its package
# predates the io.angzarr rename.) scripts/fixup_gen_imports.py rewrites
# those path imports to the `angzarr_router_ffi.gen.` package prefix after
# generation; that step is part of `py-binding-gen`. The generated tree is
# gitignored and regenerated on demand. The angzarr wiring (*_angzarr.py)
# imports message modules the same path way, so fixup_gen_imports.py reroots
# it too.
#
# Managed mode is enabled only to satisfy the angzarr plugin: it speaks the
# protoc-gen-go-style contract (protogen), which requires a go_package on every
# request file even when emitting Python.
#
# BYTE-IDENTITY (load-bearing). go_package is NOT irrelevant to Python output: it
# is embedded in each pb2's serialized FileDescriptorProto (the AddSerializedFile
# bytes). A binding-specific override therefore makes the SHARED framework
# descriptors diverge from any other party that generates the same contract,
# which collides in the global descriptor_pool.Default() ("duplicate file name").
# So managed mode must NOT touch go_package on the shared framework files — they
# carry a native go_package, identical for every generator, which keeps copies
# byte-identical so upb deduplicates re-registration. The override stays only for
# binding-owned files with no native go_package (abi, test.counter), which no
# consumer generates. See framework-proto-collision.design.md.
version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      path: google
    # Shared framework contract: disable ALL managed options on these paths so
    # the descriptors are fully native — managed mode otherwise rewrites
    # go_package AND java_package/csharp_namespace/etc., all embedded in the
    # serialized FileDescriptorProto, diverging from a consumer that doesn't run
    # managed mode (e.g. examples-python). Fully native = byte-identical for
    # every generator. (A disable with no file_option disables all management.)
    - path: io/angzarr/v1
    - path: sererr
  override:
    - file_option: go_package_prefix
      value: github.com/angzarr-io/angzarr-router/bindings/go/gen
plugins:
  - remote: buf.build/protocolbuffers/python:v35.1
    out: bindings/python/angzarr_router_ffi/gen
  # angzarr dispatch wiring for declared components. Baked into the python image
  # (build/images/python) and invoked as a local plugin. The scaffold
  # (`angzarr scaffold python`) is an end-user command, not run here.
  - local: ["angzarr", "codegen", "python"]
    out: bindings/python/angzarr_router_ffi/gen
    opt: paths=source_relative

syntax = "proto3";
package io.angzarr.router.ffi.v1;

// Auxiliary payloads crossing the C ABI. These are internal to the FFI
// boundary and versioned with the ABI (angzarr_abi_version) — they are
// NOT wire protocol and never leave the process.
//
// Errors cross the boundary as google.rpc.Status bytes carrying a
// google.rpc.ErrorInfo detail (reason = SCREAMING_SNAKE code, domain
// "angzarr.io", metadata = extras) — the exact shape gRPC serializes on
// the wire; no invented error proto.

// One (fully-qualified type name → host callback) table row.
message CallbackEntry {
  string fq_type = 1;
  uint64 callback_id = 2;
}

// Rejection rows carry ORDERED callback lists: multiple compensators for
// one rejected command all run, in registration order.
message RejectionEntry {
  string fq_command_type = 1; // FULLY-QUALIFIED; short names never match
  repeated uint64 callback_ids = 2;
}

// Registration payload for one aggregate component: the dispatch tables
// the binding's registration API (and later, generated wiring) assembles.
message AggregateDescriptor {
  string name = 1;
  string domain = 2;
  repeated CallbackEntry commands = 3;
  repeated CallbackEntry appliers = 4;
  repeated RejectionEntry rejections = 5;
  // Snapshot loader callback; absent when the aggregate takes no snapshots.
  optional uint64 snapshot_callback_id = 6;
}

// Registration payload for one projector component. Folds cross the
// callback (the host owns the projection instance); finish packs it into
// the wire Projection. Empty `domains` consumes every domain.
message ProjectorDescriptor {
  string name = 1;
  repeated string domains = 2;
  repeated CallbackEntry events = 3;
  // Packs the folded projection into the wire Projection; absent → the core
  // returns a default Projection (cover + name only).
  optional uint64 finish_callback_id = 4;
  // Observes events with no fold thunk; absent → such events are skipped
  // (the core logs a warn).
  optional uint64 unknown_callback_id = 5;
}

// Registration payload for one saga component. A stateless translator:
// declared events emit commands (the host stamps them from the supplied
// destination sequences) and/or injected fact events; rejection rows carry
// ORDERED compensators (C-0042). Empty `target_domains` is allowed.
message SagaDescriptor {
  string name = 1;
  string input_domain = 2;
  repeated string target_domains = 3;
  repeated CallbackEntry events = 4;
  repeated RejectionEntry rejections = 5;
}

// aux payload for command-handler callbacks.
message CommandContextAux {
  uint32 next_sequence = 1;
  bool had_prior_events = 2;
}

// aux payload for saga event callbacks: the coordinator-supplied
// destination next-sequences the host stamps emitted commands from. The
// host returns a SagaResponse (commands + injected fact events).
message SagaEventAux {
  map<string, uint32> destination_sequences = 1;
}

// Registration payload for one process-manager component. STATEFUL: the PM
// rebuilds its own event-sourced state (the appliers/snapshot) before each
// handler. Event handlers are keyed by (input domain, fully-qualified event
// type) — a 2-level table; rejection rows carry ORDERED compensators
// (C-0042), the first escalation winning.
message ProcessManagerDescriptor {
  string name = 1;
  string pm_domain = 2;
  repeated CallbackEntry appliers = 3; // rebuild the PM's own state
  optional uint64 snapshot_callback_id = 4;
  repeated PmEventEntry events = 5;
  repeated RejectionEntry rejections = 6;
}

// One ((input domain, fully-qualified event type) → host callback) row for a
// process manager's 2-level handler table.
message PmEventEntry {
  string input_domain = 1;
  string fq_type = 2;
  uint64 callback_id = 3;
}

// aux payload for process-manager event callbacks: the coordinator-supplied
// destination next-sequences the host stamps emitted commands from. The host
// returns a ProcessManagerHandleResponse.
message PmEventAux {
  map<string, uint32> destination_sequences = 1;
}

// aux payload for rejection (compensation) callbacks.
message RejectionAux {
  bytes notification = 1; // serialized angzarr Notification
  bytes rejection = 2;    // serialized angzarr RejectionNotification
  CommandContextAux cctx = 3;
}

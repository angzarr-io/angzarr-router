version: v2
# The router's own ABI protos (io.angzarr.router.ffi.v1). Framework protos
# are linted in the angzarr-project module; vendored google.rpc shapes are
# excluded from lint (upstream Google protos, not ours to police).
modules:
  - path: .
    excludes:
      - google
lint:
  use:
    - STANDARD
  except:
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - SERVICE_SUFFIX
    - IMPORT_USED
breaking:
  use:
    - FILE
